    .leaflet-container { position: relative; }

    .leaflet-container::before {

      inset: 0;
      pointer-events: none;

      z-index: 200;
    }

    .leaflet-container::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 50% 32%, rgba(255,255,255,0) 0%, rgba(32,34,57,0.06) 60%, rgba(32,34,57,0.10) 100%);

      z-index: 300;
    }

    .toolbar-icon-btn:focus-visible{
      outline:2px solid rgba(58, 47, 42, 0.22);
      outline-offset:2px;
    }
    
    /* Moment pills container */
    #moment-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      min-width: 0;
      flex: 1 1 auto;
    }

    #moment-bar::-webkit-scrollbar {
      display: none;
    }

    /* Pills */
    .moment-pill {
      appearance: none;
      border: 1px solid rgba(58, 47, 42, 0.10);
      background: rgba(255, 255, 255, 0.72);
      color: #2d2530;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      line-height: 1;
      letter-spacing: -0.01em;
      white-space: nowrap;
      flex: 0 0 auto;
      cursor: pointer;
      transition: background .18s ease, color .18s ease, transform .18s ease, box-shadow .18s ease;
    }

    .moment-pill:hover {
      transform: translateY(-1px);
    }
    
    .moment-pill.active {
      background: #3a2f2a; /* espresso tone */
      border-color: #3a2f2a;
      color: #fffdf9;
      box-shadow: 0 5px 14px rgba(58, 47, 42, 0.18);
    }

    .moment-pill:focus-visible {
      outline: 2px solid rgba(58, 47, 42, 0.22);
      outline-offset: 2px;
    }

    
    /* ═══════════════════════════════════════════════
       FIX 1: #map uses position:fixed (not absolute).
       This is the #1 cause of the grey-tile flash and
       the layout jump — absolute sizing races against
       iOS's async layout pipeline.
       ─────────────────────────────────────────────── */
    #map {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;

      /* Warm fallback so blank area is never cold grey */
      background: #f0ede8;

      /* Promote to GPU compositor layer before tiles arrive */
      will-change: transform;
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }

    body.map-loading #map {
      opacity: 0;
    }

    body.map-ready #map {
      opacity: 1;
      transition: opacity 0.18s ease;
    }
    
    @supports (height: 100dvh) { #map { height: 100dvh; } }

    /* Match #map fallback — no grey flash between map div and tiles */
    .leaflet-container { background: #f0ede8; }

    #bottom-panel {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 0;
      height: var(--panel-collapsed);
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 22px 22px 0 0;
      box-shadow: 0 -8px 22px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      padding: 8px 14px calc(10px + env(safe-area-inset-bottom));
      z-index: 2001;
      transition: none !important;
      overflow: hidden;
    }

    #bottom-panel.expanded { height: var(--panel-expanded); }

    #panel-header { flex: 0 0 auto; padding: 0 10px 6px; }

    #panel-body {
      flex: 1 1 auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 6px 0 10px;
    }

    #results { padding: 0; }

    #panel-meta-row {

      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 6px;
    }

      flex-wrap: wrap;
      gap: 6px;
      margin: 0;
      padding: 0;

      top: auto;
      background: transparent;

    #sortBtn {

      letter-spacing: 0.01em;

      -webkit-appearance: none;
      outline: none;
      cursor: default;
      pointer-events: none;
      opacity: .85;
    }

    #panel-toggle {

      background: transparent;
      padding: 6px 0 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #panel-toggle .handle {
      width: 44px;
      height: 5px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.18);

    #panel-toggle .label {

    #results-count {

  </div>
  <div id="panel-body">

  </div>
</div>

/* ─── EMBED MODE ──────────────────────────────────────────────── */
window.SipSober = window.SipSober || {};
document.body.classList.add("map-loading");

(function(){
  const p = new URLSearchParams(window.location.search);
  window.SipSober.isEmbed = p.get("embed")==="1";
  if(window.SipSober.isEmbed) document.body.classList.add("ss-embed");
})();

/* ─── STATE ────────────────────────────────────────────────────── */
let map, markersLayer, markersById={};
let _mapReady=false, _pendingUserLocation=null;
let currentMoment = "all";
let _userLocationForDistance=null, _userDot=null, _userHalo=null;
let _activeMarker=null, _lastFocusedVenueId=null;
let _suppressAutoFit = false;
let defaultIcon, activeIcon, currentIcon;
const mobileQuery = window.matchMedia("(max-width:767px)");

const manhattanLockBounds    = L.latLngBounds([40.5,-74.3],[40.98,-73.6]);
const manhattanInitialBounds = L.latLngBounds([40.70,-74.05],[40.88,-73.90]);

/* ─────────────────────────────────────────────────────────────────
   FIX 2: Map initialises AFTER the browser has completed its first
   paint. This guarantees Leaflet reads the true #map dimensions,
   which eliminates both the grey-tile gap and the layout jump.
   ───────────────────────────────────────────────────────────────── */
function _initMap(){
  map = L.map("map",{
    zoomControl: false,
    scrollWheelZoom: true,
    preferCanvas: true,
    // FIX 3: tap:false stops Leaflet's iOS tap shim from triggering
    // an unwanted invalidateSize() that causes the visible jump.
    tap: false
  }).setView([40.778,-73.985],12.1);

  const tiles = L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
    maxZoom: 20,
    subdomains: "abcd",
    attribution: "&copy; OpenStreetMap contributors &copy; CARTO",
    updateWhenIdle: true,
    keepBuffer: 6,
    detectRetina: false,
    updateWhenZooming: false
  });

  tiles.addTo(map);

  tiles.once("load", () => {
    document.body.classList.remove("map-loading");
    document.body.classList.add("map-ready");
    if (map) {
      map.invalidateSize({ animate: false, pan: false });
    }
  });

  map.setMaxBounds(manhattanLockBounds);
  map.options.maxBoundsViscosity = 0.1;
  map.setMinZoom(11.5);
  markersLayer = L.layerGroup().addTo(map);

  /* ─── FIX 5: Clean, two-step invalidateSize sequence ────────────
     • rAF frame 1 → layout is done
     • rAF frame 2 → paint is done → NOW call invalidateSize
     • 300 ms later → catch any WKWebView async settle
  ────────────────────────────────────────────────────────────── */
  function kickSize() {
    if (!map) return;
    requestAnimationFrame(() => {
      map.invalidateSize({ animate: false, pan: false });
    });
  }

  map.whenReady(() => {
    kickSize();
    setTimeout(() => {
      if (map) map.invalidateSize({ animate: false, pan: false });
    }, 150);
  });

  window.addEventListener("resize", kickSize);
  window.addEventListener("orientationchange", () => {
    setTimeout(kickSize, 150);
  });

  map.on("popupclose",()=>{ clearActiveMarker(); _lastFocusedVenueId=null; });

  _buildIcons();
  applyIconForViewport();
  mobileQuery.addEventListener("change", applyIconForViewport);

  _mapReady = true;
  if(_pendingUserLocation){
    window.SipSober.setUserLocation(_pendingUserLocation.lat,_pendingUserLocation.lng);
    _pendingUserLocation = null;
  }

  applyFiltersUnified();
  window.SipSober?.sendVenuesToNative?.();
  kickSize();
}

// Start the map as soon as the DOM is ready
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", () => {
    requestAnimationFrame(_initMap);
  });
} else {
  requestAnimationFrame(_initMap);
}

/* ─── ICONS ────────────────────────────────────────────────────── */
function makePinIconSVG(hex="#1F2430",size=[28,38],opts={}){
  const [w,h]=size, ring=opts.ring??false;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 28 38">
    ${ring?`<path d="M14 0C6.82 0 1 5.82 1 13c0 9.75 11.4 23.4 12.01 24.13a1.25 1.25 0 0 0 1.98 0C15.6 36.4 27 22.75 27 13 27 5.82 21.18 0 14 0z" fill="none" stroke="rgba(32,34,57,0.20)" stroke-width="2.2"/>` : ""}
    <path d="M14 0C6.82 0 1 5.82 1 13c0 9.75 11.4 23.4 12.01 24.13a1.25 1.25 0 0 0 1.98 0C15.6 36.4 27 22.75 27 13 27 5.82 21.18 0 14 0z" fill="${hex}" stroke="rgba(0,0,0,0.14)" stroke-width="0.5"/>
    <circle cx="14" cy="13" r="4.6" fill="#F5F6FA"/>
  </svg>`;
}

function makeIcon(size=[28,38],color="#1F2430",isActive=false){
  return L.icon({
    iconUrl:"data:image/svg+xml;utf8,"+encodeURIComponent(makePinIconSVG(color,size,{ring:isActive})),
    iconSize:size,
    iconAnchor:[Math.floor(size[0]/2),size[1]],
    popupAnchor:[0,-Math.floor(size[1]*0.84)]
  });
}

function _buildIcons(){
  const isMobile = mobileQuery.matches;
  const size = isMobile?[16,24]:[26,36];
  defaultIcon = makeIcon(size,"#1F2430",false);
  activeIcon  = makeIcon(size,"#1F2430",true);
  currentIcon = defaultIcon;
  L.Marker.prototype.options.icon = currentIcon;
}

const __origMarkerFactory = L.marker;
L.marker = function(latlng,options){
  const opts=options||{};
  if(!opts.icon) opts.icon=currentIcon||makeIcon();
  return __origMarkerFactory.call(this,latlng,opts);
};

function setActiveMarker(m){
  if(_activeMarker&&_activeMarker!==m) _activeMarker.setIcon(defaultIcon);
  _activeMarker=m||null;
  if(_activeMarker) _activeMarker.setIcon(activeIcon);
}

function clearActiveMarker(){
  if(_activeMarker) _activeMarker.setIcon(defaultIcon);
  _activeMarker=null;
}

function applyIconForViewport(){
  if(!map) return;
  _buildIcons();
  if(markersLayer&&markersLayer.eachLayer){
    markersLayer.eachLayer(layer=>{
      if(!layer||typeof layer.setIcon!=="function") return;
      layer.setIcon(layer===_activeMarker?activeIcon:defaultIcon);
    });
  }
}

/* ─── UI HELPERS ───────────────────────────────────────────────── */
function closeAllMenus(){
  // old dropdown menus are gone
}

function normalizeUrl(u){
  u=String(u||"").trim();
  if(!u||u.toLowerCase()==="n/a") return "";
  if(!/^https?:\/\//i.test(u)) u="https://"+u;
  return u;
}

function matchesSearch(loc,q){
  if(!q) return true;
  return [loc.name, loc.address, loc.neighborhood]
    .filter(Boolean)
    .join(" ")
    .toLowerCase()
    .includes(q.toLowerCase());
}

function matchesMoment(loc){
  if(currentMoment === "all") return true;

  const moments = Array.isArray(loc.moments)
    ? loc.moments.map(m => String(m).toLowerCase())
    : [];

  return moments.includes(currentMoment);
}

/* ─── FILTER CHIPS ─────────────────────────────────────────────── */
function updateActiveMoment(){
  const c = document.getElementById("active-filters");
  if(!c) return;

  c.innerHTML = "";

  if(currentMoment === "all"){
    c.style.display = "none";
    return;
  }

  c.style.display = "flex";

  const p = document.createElement("span");
  p.className = "filter-pill";

  const x = document.createElement("span");
  x.className = "filter-pill-x";
  x.textContent = "×";
  x.addEventListener("click", () => {
    currentMoment = "all";
    syncMomentPillsUI();
    applyFiltersUnified();
  });

  const l = document.createElement("span");
  l.textContent = currentMoment.charAt(0).toUpperCase() + currentMoment.slice(1);

  p.appendChild(x);
  p.appendChild(l);
  c.appendChild(p);
}

/* ─── NATIVE BRIDGE ────────────────────────────────────────────── */
let _didSendVenuesToNative=false;
function _venueForNative(loc){
  return {
    id: String(loc.id || ""),
    name: String(loc.name || ""),
    address: String(loc.address || ""),
    neighborhood: String(loc.neighborhood || ""),
    website: normalizeUrl(loc.website || ""),
    lat: Number(loc.lat || 0),
    lng: Number(loc.lng || 0),
    imageUrl: String(loc.imageUrl || "")
  };
}
  
window.SipSober.sendVenuesToNative=function(arg){
  try{
    const force=(typeof arg==="boolean")?arg:false;
    const source=Array.isArray(arg)?arg:(locations||[]);
    if(_didSendVenuesToNative&&!force&&!Array.isArray(arg)) return;
    const venues=source.map(_venueForNative).filter(v=>v.id&&v.name);
    if(window.webkit?.messageHandlers?.sipSober){
      window.webkit.messageHandlers.sipSober.postMessage({type:"venues",venues});
      _didSendVenuesToNative=true;
    }
  }catch(e){}
};

window.addEventListener("load",()=>setTimeout(()=>window.SipSober.sendVenuesToNative(),400));

/* ─── RENDERERS ────────────────────────────────────────────────── */
function renderMarkers(data){
  if(!markersLayer) return{count:0,bounds:null};
  markersLayer.clearLayers(); clearActiveMarker(); markersById={};
  const bounds=L.latLngBounds([]);
  data.forEach(loc=>{
    const m=L.marker([loc.lat,loc.lng]).addTo(markersLayer);
    m.on("click",()=>setActiveMarker(m));
    if(loc.id) markersById[String(loc.id)]=m;
    const imgHtml=loc.imageUrl?`<div class="ss-popup-img-wrap"><img class="ss-popup-img" src="${loc.imageUrl}" alt="${loc.name||""}" loading="lazy" onerror="this.closest('.ss-popup-img-wrap')?.remove()"></div>`:"";
    const web=normalizeUrl(loc.website);
    m.bindPopup(`<div class="ss-popup ss-popup--simple"><div class="ss-popup-top">${imgHtml}<div class="ss-popup-text"><div class="ss-popup-title">${loc.name||""}</div>${loc.neighborhood?`<div class="ss-popup-tags">${loc.neighborhood}</div>`:""}<div class="ss-popup-meta">${loc.address||""}</div><div class="ss-popup-actions">${web?`<a class="ss-pill" href="${web}" target="_blank" rel="noopener">Website</a>`:""}<a class="ss-pill secondary" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent((loc.name||"")+" "+(loc.address||""))}" target="_blank" rel="noopener">Directions</a></div></div></div></div>`,{minWidth:220,maxWidth:280,closeButton:true,autoPan:true,keepInView:true,autoPanPaddingTopLeft:[18,160],autoPanPaddingBottomRight:[18,260],offset:[0,-18]});
    bounds.extend([loc.lat,loc.lng]);
  });
  return{count:data.length,bounds:data.length?bounds:null};
}

function renderList(data){
  const results=document.getElementById("results");
  const rc=document.getElementById("results-count");
  if(!results) return;
  results.innerHTML="";
  if(rc) rc.textContent=data.length===0?"No places found":`${data.length} place${data.length===1?"":"s"}`;
  data.forEach(loc=>{
    const card=document.createElement("div"); card.className="card";
    const web=normalizeUrl(loc.website);
    card.innerHTML=`<div class="card-top"><span class="card-name" data-focus-id="${loc.id}">${loc.name}</span><button class="fav-btn" data-id="${loc.id}" aria-label="Favorite">★</button></div><div class="meta">${loc.address||""}</div>${web?`<a href="${web}" target="_blank" rel="noopener">Website</a>`:""}<div class="meta">${[_distanceLabelForVenue(loc), loc.neighborhood || ""].filter(Boolean).join(" • ")}</div>`;    results.appendChild(card);
  });
  window.SipSober?.sendVenuesToNative?.(data);
}

/* ─── FILTER + APPLY ────────────────────────────────────────────── */
function applyFiltersUnified(){
  closeAllMenus();

  const q = (document.getElementById("searchTopInput")?.value || "").trim();

  let filtered = locations.filter(loc => {
    return matchesMoment(loc) && matchesSearch(loc, q);
  });

  const hasLoc = !!_userLocationForDistance;

  if (hasLoc) {
    filtered.sort((a, b) => {
      const da = _distanceMilesForVenue(a);
      const db = _distanceMilesForVenue(b);

      if (da == null && db == null) {
        return (a.name || "").localeCompare(b.name || "", undefined, { sensitivity: "base" });
      }
      if (da == null) return 1;
      if (db == null) return -1;
      if (da !== db) return da - db;

      return (a.name || "").localeCompare(b.name || "", undefined, { sensitivity: "base" });
    });
  } else {
    filtered.sort((a, b) =>
      (a.name || "").localeCompare(b.name || "", undefined, { sensitivity: "base" })
    );
  }

  const sortBtn = document.getElementById("sortBtn");
  if (sortBtn) sortBtn.textContent = hasLoc ? "Miles" : "A–Z";

  renderList(filtered);
  updateActiveMoment();

  if (!map) {
    window.filteredBounds = null;
    return;
  }

  const { count, bounds } = renderMarkers(filtered);

  const panel = document.getElementById("bottom-panel");
  const panelH = panel ? panel.getBoundingClientRect().height : 0;

  const isDefaultView =
    currentMoment === "all" &&
    !q.length &&
    !hasLoc;

  if (!_suppressAutoFit) {
    if (isDefaultView) {
      fitInitialView();
    } else if (count > 0 && bounds) {
      map.fitBounds(bounds, {
        paddingTopLeft: [16, window.SipSober?.isEmbed ? 80 : 120],
        paddingBottomRight: [16, panelH + 40],
        maxZoom: 16,
        animate: false
      });
    }
  }

  window.filteredBounds = bounds;
}
  
function applyFiltersWithUserLocation(){applyFiltersUnified();}
function applyFilters(){applyFiltersUnified();}

/* ─── LOCATION BRIDGE ───────────────────────────────────────────── */
function _showUserLocation(lat,lng){
  if(!map) return;
  const ll=L.latLng(lat,lng);
  if(_userDot){try{map.removeLayer(_userDot);}catch(e){}_userDot=null;}
  if(_userHalo){try{map.removeLayer(_userHalo);}catch(e){}_userHalo=null;}
  _userHalo=L.circle(ll,{radius:120,stroke:false,fill:true,fillOpacity:0.12}).addTo(map);
  _userDot=L.circleMarker(ll,{radius:6,stroke:true,weight:2,opacity:1,fill:true,fillOpacity:1}).addTo(map);
}

function _clearUserLocationLayers(){
  if(_userDot){try{map.removeLayer(_userDot);}catch(e){}_userDot=null;}
  if(_userHalo){try{map.removeLayer(_userHalo);}catch(e){}_userHalo=null;}
}

function _haversineMiles(lat1,lon1,lat2,lon2){
  const r=v=>(v*Math.PI)/180, R=3958.7613;
  const dLat=r(lat2-lat1),dLon=r(lon2-lon1);
  const a=Math.sin(dLat/2)**2+Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function _distanceMilesForVenue(loc){
  if(!_userLocationForDistance) return null;
  const lat=Number(loc?.lat),lng=Number(loc?.lng);
  if(!Number.isFinite(lat)||!Number.isFinite(lng)) return null;
  const m=_haversineMiles(_userLocationForDistance.lat,_userLocationForDistance.lng,lat,lng);
  return Number.isFinite(m)?m:null;
}

function _distanceLabelForVenue(loc){
  if(!_userLocationForDistance) return "";
  const m=_distanceMilesForVenue(loc);
  if(m==null) return "";
  return m<0.1?"<0.1 mi":`${m.toFixed(1)} mi`;
}

window.SipSober.setUserLocation=function(lat,lng){
  const LAT=Number(lat),LNG=Number(lng);
  if(!Number.isFinite(LAT)||!Number.isFinite(LNG)) return;
  if(!_mapReady){_pendingUserLocation={lat:LAT,lng:LNG};return;}
  _pendingUserLocation=null;
  _showUserLocation(LAT,LNG);
  _userLocationForDistance={lat:LAT,lng:LNG};
  applyFiltersUnified();
  map.invalidateSize(false);
  map.setView([LAT,LNG],Math.max(map.getZoom(),15),{animate:true});
  const panel=document.getElementById("bottom-panel");
  if(panel) panel.classList.add("expanded");
};

window.SipSober.clearUserLocation=function(){
  _pendingUserLocation=null; _userLocationForDistance=null;
  applyFiltersUnified();
  if(!_mapReady) return;
  _clearUserLocationLayers();
};

window.SipSober.resetMapToDefault=function(){resetMapToDefault();};
window.setUserLocation  =function(lat,lng){window.SipSober.setUserLocation(lat,lng);};
window.clearUserLocation=function(){window.SipSober.clearUserLocation();};
window.resetMapToDefault=function(){window.SipSober.resetMapToDefault();};

/* ─── RESET ─────────────────────────────────────────────────────── */
function fitInitialView(){
  if(!map) return;

  const panel = document.getElementById("bottom-panel");
  const panelH = panel ? panel.getBoundingClientRect().height : 0;

  const defaultBounds = L.latLngBounds(
    [40.715, -74.03],  // lower-left (trim lower Manhattan)
    [40.835, -73.93]   // upper-right (show more upper Manhattan)
  );

  map.fitBounds(defaultBounds, {
    paddingTopLeft: [16, window.SipSober?.isEmbed ? 75 : 115],
    paddingBottomRight: [16, panelH + 30],
    animate: false
  });
}

function resetMapToDefault(){
  closeAllMenus();
  
  currentMoment = "all";
  _suppressAutoFit = true;

  window.SipSober.clearUserLocation();
  applyFiltersUnified();
  updateActiveMoment();

  if (map) {
    map.closePopup();
    map.invalidateSize({ animate: false, pan: false });
    fitInitialView();
  }

  _suppressAutoFit = false;
}

/* ─── FAVORITES + FOCUS ─────────────────────────────────────────── */
window.SipSober.setFavorites=function(payload){
  const ids=new Set((payload&&payload.ids)||[]);
  document.querySelectorAll(".fav-btn[data-id]").forEach(btn=>btn.classList.toggle("is-fav",ids.has(btn.dataset.id)));
};


window.BrewBreak = window.BrewBreak || {};

function syncMomentPillsUI(){
  document.querySelectorAll(".moment-pill").forEach(btn => {
    const value = String(btn.dataset.moment || "all").toLowerCase().trim();
    btn.classList.toggle("active", value === currentMoment);
  });
}
  
function setMoment(moment){
  const nextMoment = String(moment || "all").toLowerCase();

  currentMoment = ["all", "work", "quick", "social", "relax"].includes(nextMoment)
    ? nextMoment
    : "all";

  syncMomentPillsUI();
  updateActiveMoment();
  applyFiltersUnified();
}
  
function bindMomentPills(){
  document.querySelectorAll(".moment-pill").forEach(btn => {
    btn.addEventListener("click", () => {
      const nextMoment = String(btn.dataset.moment || "all").toLowerCase().trim();
      setMoment(nextMoment);
    });
  });
}

window.BrewBreak.setMoment = setMoment;
window.SipSober.setMoment = setMoment;

window.SipSober.focusVenue = function(payload){
  const id = String((typeof payload === "string" ? payload : payload?.venueId) || "").trim();
  if (!id || _lastFocusedVenueId === id) return;

  _lastFocusedVenueId = id;

  applyFiltersUnified();

  let tries = 0;
  (function attempt(){
    const marker = markersById?.[id];
    if (!marker) {
      if (++tries <= 25) return setTimeout(attempt, 120);
      _lastFocusedVenueId = null;
      return;
    }

    const ll = marker.getLatLng();
    map.invalidateSize(false);
    map.setView([ll.lat, ll.lng], 16, { animate: true });

    setTimeout(() => {
      setActiveMarker(marker);
      marker.openPopup();

      const c = document.querySelector(".leaflet-popup-close-button");
      if (c) c.addEventListener("click", () => { _lastFocusedVenueId = null; }, { once: true });
    }, 200);

    const panel = document.getElementById("bottom-panel");
    if (panel) panel.classList.add("expanded");
  })();
};

window.SipSober.focusVenueById=function(id){window.SipSober.focusVenue(id);};
window.SipSober.closePopup=function(){try{map?.closePopup();}catch(e){}};

/* ─── EVENT WIRING ──────────────────────────────────────────────── */
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeAllMenus();
});

document.addEventListener("click", e => {
  if (e.target.closest("a")) {
    closeAllMenus();
    return;
  }

  const favBtn = e.target.closest(".fav-btn");
  if (favBtn) {
    e.preventDefault();
    e.stopPropagation();

    const venueId = favBtn.dataset.id;
    const v = locations.find(x => String(x.id) === String(venueId));
    if (!v) return;

    favBtn.classList.toggle("is-fav");

    window.webkit?.messageHandlers?.favorites?.postMessage({
      action: "toggle",
      venue: {
        venueId: String(v.id),
        name: v.name || "",
        address: v.address || "",
        website: normalizeUrl(v.website || ""),
        neighborhood: v.neighborhood || ""
      }
    });

    return;
  }

  const nameEl = e.target.closest(".card-name[data-focus-id]");
  if (nameEl) {
    e.preventDefault();
    e.stopPropagation();
    window.SipSober?.focusVenue(nameEl.dataset.focusId);
    return;
  }
  
});


const locateBtn = document.getElementById("locateBtn");
const resetBtn = document.getElementById("resetBtn");

locateBtn?.addEventListener("click", e => {
  e.preventDefault();
  e.stopPropagation();

  if (window.webkit?.messageHandlers?.sipSober) {
    window.webkit.messageHandlers.sipSober.postMessage({ type: "requestLocation" });
  }
});

resetBtn?.addEventListener("click", e => {
  e.preventDefault();
  e.stopPropagation();

  currentMoment = "all";
  syncMomentPillsUI();
  updateActiveMoment();

  resetMapToDefault();
  
});
  
(() => {
  const panel = document.getElementById("bottom-panel");
  const toggle = document.getElementById("panel-toggle");
  const label = toggle?.querySelector(".label");
  if (!panel || !toggle) return;

  function syncLabel() {
    const ex = panel.classList.contains("expanded");
    toggle.setAttribute("aria-expanded", ex ? "true" : "false");
    if (label) label.textContent = ex ? "Hide" : "Show";
  }

  toggle.addEventListener("click", e => {
    e.stopPropagation();
    panel.classList.toggle("expanded");
    syncLabel();
  });

  if (window.matchMedia("(max-width:768px)").matches) panel.classList.add("expanded");
  syncLabel();
})();

bindMomentPills();
syncMomentPillsUI();
updateActiveMoment();

// Render list immediately (map init is async but list doesn't need it)
renderList(locations.slice().sort((a, b) => (a.name || "").localeCompare(b.name || "")));
  
</script>

<script>
(function(){
  const KEY="ss_seen_map_onboarding_v1";
  function showOnboarding(){
    if(localStorage.getItem(KEY)==="true") return;
    const el=document.getElementById("ss-onboard"); if(!el) return;
    el.hidden=false; requestAnimationFrame(()=>el.classList.add("is-visible"));
    const ok=document.getElementById("ss-onboard-ok");
    function dismiss(){localStorage.setItem(KEY,"true");el.classList.remove("is-visible");setTimeout(()=>(el.hidden=true),240);}
    ok?.addEventListener("click",dismiss);
  }
  window.addEventListener("load",()=>setTimeout(showOnboarding,450));
})();
</script>
